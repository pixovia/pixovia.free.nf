<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 | System Failure - Pixovia</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Glitchy Grid Background */
        .grid-bg {
            position: absolute;
            width: 150%;
            height: 150%;
            background-image: 
                linear-gradient(to right, rgba(239, 68, 68, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(239, 68, 68, 0.05) 1px, transparent 1px);
            background-size: 80px 80px;
            transform: rotate(-12deg);
            z-index: 0;
            animation: grid-drift 20s linear infinite;
        }

        @keyframes grid-drift {
            from { transform: rotate(-12deg) translateY(0); }
            to { transform: rotate(-12deg) translateY(80px); }
        }

        .failure-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.15) 0%, transparent 70%);
            filter: blur(60px);
            z-index: 1;
            animation: orb-pulse 4s infinite alternate ease-in-out;
        }

        @keyframes orb-pulse {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.3); opacity: 0.8; }
        }

        .glass-card {
            background: rgba(10, 10, 10, 0.7);
            border: 1px solid rgba(239, 68, 68, 0.2);
            backdrop-filter: blur(50px);
            border-radius: 40px;
            padding: 80px 40px;
            position: relative;
            z-index: 10;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .warning-tag {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #ef4444;
            margin-bottom: 24px;
            display: block;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .btn-reboot {
            background: #ef4444;
            color: #ffffff;
            padding: 20px 44px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
        }

        .btn-reboot:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(239, 68, 68, 0.5);
            background: #f87171;
        }

        .status-code {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 120px;
            font-weight: 900;
            color: rgba(239, 68, 68, 0.03);
            pointer-events: none;
            user-select: none;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
            pointer-events: none;
            z-index: 2;
        }

        .glitch-text {
            position: relative;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="grid-bg"></div>
    <div class="failure-orb"></div>

    <div class="glass-card">
        <div class="status-code mono">500</div>
        
        <span class="warning-tag">Critical System Error</span>

        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter mb-8 leading-tight uppercase">
            Core Logic <br><span class="text-red-500">Fractured.</span>
        </h1>

        <p class="text-gray-400 text-sm font-medium leading-relaxed mb-12 max-w-xs mx-auto">
            Something went wrong deep within the Pixovia infrastructure. Our engineers have been alerted.
        </p>

        <div class="flex flex-col gap-6 items-center">
            <button onclick="window.location.reload()" class="btn-reboot">
                Attempt Reboot
            </button>
            <a href="https://pixovia.pages.dev/" class="text-[10px] font-bold uppercase tracking-[3px] text-white/20 hover:text-white transition-colors">
                Emergency Exit
            </a>
        </div>

        <div class="mt-16 space-y-2">
            <div class="flex justify-center gap-4">
                <div class="h-1 w-8 bg-red-500/20 rounded-full"></div>
                <div class="h-1 w-8 bg-red-500/20 rounded-full"></div>
                <div class="h-1 w-8 bg-red-500 rounded-full animate-pulse"></div>
            </div>
            <p class="mono text-[9px] text-red-900 uppercase tracking-widest pt-4">
                Error Dump: STACK_OVERFLOW_EXC_0x005
            </p>
        </div>
    </div>

</body>
</html>
