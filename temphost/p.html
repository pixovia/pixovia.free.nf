<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eduport | Pixovia Learn Player </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f9fafb;
    }
    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .quality-btn {
      background-color: #f3f4f6;
      color: #374151;
      border-radius: 8px;
      padding: 6px 12px;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .quality-btn:hover {
      background-color: #e5e7eb;
    }
    .quality-btn.active {
      background-color: #3b82f6;
      color: white;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center">

  <!-- Header -->
  <header class="w-full max-w-5xl flex items-center justify-between px-4 py-4 bg-white border-b shadow-sm rounded-b-3xl mb-6">
    <div class="flex items-center space-x-3">
      <img src="https://media.licdn.com/dms/image/v2/D560BAQEJe_G69SfZXA/company-logo_200_200/company-logo_200_200/0/1731746328968?e=2147483647&v=beta&t=i6VRtIcoqeb3nRbsqcj4KPnMuQ5AB_f81Ww18jQUGXQ"
           class="w-8 h-8 rounded-full object-cover" />
      <div class="w-px h-5 bg-gray-300"></div>
      <img src="https://pixovia.pages.dev/icon-coloured-closeup.jpg"
           class="w-8 h-8 rounded-full object-cover" />
      <span class="text-gray-800 font-semibold text-lg ml-1">Learn</span>
    </div>
    <button onclick="window.history.back()" class="text-gray-600 hover:text-indigo-600">
      <i class="fa-solid fa-arrow-left mr-1"></i> Back
    </button>
  </header>

  <!-- Main Content -->
  <main class="w-full max-w-4xl p-4 space-y-6">
    <!-- Title -->
    <h1 id="lessonTitle" class="text-xl font-bold text-gray-800 text-center mb-4">Loading...</h1>

    <!-- Video -->
    <div class="video-container" id="player-wrapper"></div>

    <!-- Quality Controls -->
    <div id="quality-controls" class="flex justify-center flex-wrap gap-2">
      <button class="quality-btn" data-quality="240p">240p</button>
      <button class="quality-btn" data-quality="360p">360p</button>
      <button class="quality-btn active" data-quality="480p">480p</button>
      <button class="quality-btn" data-quality="720p">720p</button>
    </div>

    <!-- Notes + DPP -->
    <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col sm:flex-row items-center justify-between gap-4">
      <a id="noteLink"
         href="#"
         target="_blank"
         class="hidden flex items-center justify-center w-full sm:w-auto bg-blue-50 text-blue-700 font-semibold px-6 py-3 rounded-xl hover:bg-blue-100 transition">
        <i class="fa-solid fa-paperclip mr-2"></i> Download Notes
      </a>
      <a id="dppLink"
         href="#"
         target="_blank"
         class="hidden w-full sm:w-auto bg-[#FF6D33] hover:bg-[#E65A22] text-white font-bold px-10 py-3 rounded-xl shadow-lg shadow-orange-200 transition-all active:scale-95 text-center">
         📘 DPP Sheet
      </a>
    </div>
  </main>

<script>
  const playerWrapper = document.getElementById('player-wrapper');
  const qualityButtons = document.querySelectorAll('.quality-btn');
  const noteLink = document.getElementById('noteLink');
  const dppLink = document.getElementById('dppLink');
  const titleEl = document.getElementById('lessonTitle');

  // 🎯 Read from sessionStorage
  const topic = sessionStorage.getItem('topic');
  const baseUrl = sessionStorage.getItem('class'); // stored 480p URL
  const noteUrl = sessionStorage.getItem('note');
  const dppUrl = sessionStorage.getItem('dpp');

  titleEl.textContent = topic || "Untitled Lesson";

  // 🧩 Display Notes and DPP if available
  if (noteUrl) {
    noteLink.href = noteUrl;
    noteLink.classList.remove('hidden');
  }
  if (dppUrl) {
    dppLink.href = dppUrl;
    dppLink.classList.remove('hidden');
  }

  let hlsInstance = null;
  let currentQuality = "480p";

  // 🧠 Build full quality URL dynamically
  function buildQualityUrl(base480pUrl, newQuality) {
    // Check if it’s Eduport HLS URL pattern
    if (base480pUrl.includes("/hls/") && base480pUrl.endsWith("video.m3u8")) {
      return base480pUrl.replace("/480p_h264/", `/${newQuality}_h264/`);
    }
    return base480pUrl; // fallback
  }

  // 🎞️ Load Video Player
  function loadVideo(url) {
    playerWrapper.innerHTML = "";

    // Case 1: :contentReference[oaicite:1]{index=1} video
    if (url.includes("youtube.com") || url.includes("youtu.be")) {
      const embed = url
        .replace("watch?v=", "embed/")
        .replace("youtu.be/", "www.youtube.com/embed/");
      playerWrapper.innerHTML = `
        <iframe src="${embed}" class="w-full h-full rounded-2xl" frameborder="0" allowfullscreen></iframe>`;
      document.getElementById("quality-controls").classList.add("hidden");
      return;
    }

    // Case 2: MP4 link
    if (url.endsWith(".mp4")) {
      const video = document.createElement("video");
      video.src = url;
      video.controls = true;
      video.autoplay = true;
      video.className = "w-full h-full bg-black rounded-2xl";
      playerWrapper.appendChild(video);
      document.getElementById("quality-controls").classList.add("hidden");
      return;
    }

    // Case 3: HLS (.m3u8)
    if (url.endsWith(".m3u8")) {
      const video = document.createElement("video");
      video.controls = true;
      video.autoplay = true;
      video.playsInline = true;
      video.muted = true;
      video.className = "w-full h-full bg-black rounded-2xl";
      playerWrapper.appendChild(video);

      if (Hls.isSupported()) {
        if (hlsInstance) hlsInstance.destroy();
        hlsInstance = new Hls({
          debug: false,
          enableWorker: true,
          manifestLoadingBaseURL: url.substring(0, url.lastIndexOf("/") + 1),
        });

        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);

        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(err => console.warn("Autoplay blocked", err));
        });

        hlsInstance.on(Hls.Events.ERROR, (event, data) => {
          console.warn("HLS error:", data.type, data.details);
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = url;
        video.addEventListener("loadedmetadata", () => video.play());
      }
    } else {
      playerWrapper.innerHTML =
        '<div class="flex items-center justify-center h-full text-white text-lg">❌ Unsupported video format.</div>';
    }
  }

  // Load default video (480p from DB)
  loadVideo(baseUrl);

  // ⚙️ Quality switch buttons
  qualityButtons.forEach((btn) => {
    btn.addEventListener("click", () => {
      qualityButtons.forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");

      const selectedQuality = btn.dataset.quality;
      currentQuality = selectedQuality;

      // Build new quality URL
      const newUrl = buildQualityUrl(baseUrl, selectedQuality);
      console.log(`Switching to: ${selectedQuality} → ${newUrl}`);

      loadVideo(newUrl);
    });
  });
</script>
</body>
</html>
