<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pexels → Supabase Auto Sync</title>
<style>
body{font-family:system-ui,sans-serif;background:#f6f8fb;color:#111;padding:18px;}
.wrap{max-width:900px;margin:0 auto;}
button{padding:8px 16px;margin:8px 4px;border:none;border-radius:6px;cursor:pointer;}
#startBtn{background:#10b981;color:#fff;}
#stopBtn{background:#ef4444;color:#fff;}
.log{background:#fff;border-radius:8px;padding:10px;height:200px;overflow:auto;box-shadow:0 1px 6px rgba(0,0,0,0.08);}
</style>
</head>
<body>
<div class="wrap">
<h1>Pexels → Supabase Auto Uploader</h1>
<p>Fetches batches of images (no videos) and pushes metadata to Supabase.<br>
Click <b>Start</b> to begin / <b>Stop</b> to end. Skips duplicates & titles > 255 chars.</p>

<label>Pexels API Key:</label><br>
<input id="pexelsKey" type="text" style="width:100%" placeholder="Your Pexels API key"><br>
<label>Supabase Anon Key:</label><br>
<input id="supabaseKey" type="text" style="width:100%" placeholder="Your Supabase anon key"><br>
<label>Search Query (blank for curated):</label><br>
<input id="query" type="text" style="width:100%" placeholder="e.g. nature, city"><br>
<button id="startBtn">Start</button><button id="stopBtn" disabled>Stop</button>
<div id="status" class="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://fxcfusffpncorldogyku.supabase.co";
const TABLE_NAME="files";
const ALBUM_ID="pexels.assets.collection";
let supabaseClient=null, running=false, page=1;
const seenUrls=new Set(); const seenIds=new Set();
const logEl=document.getElementById("status");
function log(msg){logEl.innerHTML+="<div>"+msg+"</div>";logEl.scrollTop=logEl.scrollHeight;}

function randomId(){const c="abcdefghijklmnopqrstuvwxyz0123456789";let o="";for(let i=0;i<7;i++)o+=c[Math.floor(Math.random()*c.length)];return o;}
function generateId(title){return title.toLowerCase().trim().replace(/\s+/g,".").replace(/[^a-z0-9.]/g,"").replace(/\.+/g,".")+"."+randomId();}
function mapPhoto(p){const t=p.alt||p.photographer||"Untitled";if(t.length>255)return null;
const url=p.src?.original||p.src?.large2x||p.src?.large;if(!url)return null;
return{id:generateId(t),title:t,file_url:url,file_type:"image",uploader:"Pexels",album_id:ALBUM_ID};}

async function fetchPexels(k,q){
 const base=q?"https://api.pexels.com/v1/search":"https://api.pexels.com/v1/curated";
 const url=base+"?page="+page+"&per_page=80"+(q?"&query="+encodeURIComponent(q):"");
 const r=await fetch(url,{headers:{Authorization:k}});
 if(!r.ok)throw new Error("Pexels API "+r.status);
 const j=await r.json();return j.photos||[];
}

async function upload(rows){
 if(!rows.length)return;
 const {error}=await supabaseClient.from(TABLE_NAME).upsert(rows,{onConflict:["file_url"]});
 if(error)log("⚠ "+error.message);else log("✅ Uploaded "+rows.length+" rows");
}

async function loop(){
 while(running){
  try{
   const pexelsKey=document.getElementById("pexelsKey").value.trim();
   const query=document.getElementById("query").value.trim();
   const photos=await fetchPexels(pexelsKey,query);
   if(!photos.length){log("No more results. Restarting from page 1.");page=1;continue;}
   const rows=[];
   for(const p of photos){
     if(seenIds.has(p.id))continue; seenIds.add(p.id);
     const row=mapPhoto(p); if(!row)continue;
     if(seenUrls.has(row.file_url))continue; seenUrls.add(row.file_url);
     rows.push(row);
   }
   await upload(rows);
   page++;
   await new Promise(r=>setTimeout(r,5000)); // wait 5 s between batches
  }catch(e){log("Error: "+e.message);await new Promise(r=>setTimeout(r,10000));}
 }
}

document.getElementById("startBtn").onclick=()=>{
 const pexelsKey=document.getElementById("pexelsKey").value.trim();
 const supabaseKey=document.getElementById("supabaseKey").value.trim();
 if(!pexelsKey||!supabaseKey){alert("Enter both keys first.");return;}
 if(!supabaseClient)supabaseClient=supabase.createClient(SUPABASE_URL,supabaseKey);
 running=true;page=1;log("▶ Auto-sync started…");document.getElementById("startBtn").disabled=true;
 document.getElementById("stopBtn").disabled=false;loop();
};

document.getElementById("stopBtn").onclick=()=>{
 running=false;document.getElementById("startBtn").disabled=false;
 document.getElementById("stopBtn").disabled=true;log("⏹ Stopped.");
};
</script>
</body>
</html>
