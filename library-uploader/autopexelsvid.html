<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pexels Videos → Supabase Auto Sync</title>
<style>
body{font-family:system-ui,sans-serif;background:#f6f8fb;color:#111;padding:18px;}
.wrap{max-width:900px;margin:0 auto;}
button{padding:8px 16px;margin:8px 4px;border:none;border-radius:6px;cursor:pointer;}
#startBtn{background:#10b981;color:#fff;}
#stopBtn{background:#ef4444;color:#fff;}
.log{background:#fff;border-radius:8px;padding:10px;height:200px;overflow:auto;box-shadow:0 1px 6px rgba(0,0,0,0.08);}
</style>
</head>
<body>
<div class="wrap">
<h1>Pexels Videos → Supabase Auto Uploader</h1>
<p>Fetches batches of videos and pushes metadata to Supabase.<br>
Click <b>Start</b> to begin / <b>Stop</b> to end. Skips duplicates & titles &gt; 255 chars.</p>

<label>Pexels API Key:</label><br>
<input id="pexelsKey" type="text" style="width:100%" placeholder="Your Pexels API key"><br>
<label>Search Query (blank for popular):</label><br>
<input id="query" type="text" style="width:100%" placeholder="e.g. nature, ocean"><br>
<button id="startBtn">Start</button><button id="stopBtn" disabled>Stop</button>
<div id="status" class="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== CONFIGURATION =====
const SUPABASE_URL = "https://fxcfusffpncorldogyku.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4Y2Z1c2ZmcG5jb3JsZG9neWt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NDEwMzQsImV4cCI6MjA4MzAxNzAzNH0.7lF1aYo4eP2by4wAnSCTpqhElgN6_TdPsItvQtxNGPI";
const TABLE_NAME = "files";
const ALBUM_ID = "pexels.videos.9q4j2m7";
// ==========================

let supabaseClient = null, running = false, page = 1;
const seenUrls = new Set(), seenIds = new Set();
const logEl = document.getElementById("status");
function log(msg){ logEl.innerHTML += "<div>"+msg+"</div>"; logEl.scrollTop = logEl.scrollHeight; }

function randomId(){
  const c="abcdefghijklmnopqrstuvwxyz0123456789";let o="";
  for(let i=0;i<7;i++)o+=c[Math.floor(Math.random()*c.length)];
  return o;
}
function makeTitle(url){
  const m=url.match(/\/video\/(.*?)\/?$/);
  if(!m||!m[1])return "Untitled";
  return m[1].replace(/-/g," ");
}
function makeId(title){
  return title.toLowerCase().trim()
    .replace(/\s+/g,".")
    .replace(/[^a-z0-9.]/g,"")
    .replace(/\.+/g,".")+"."+randomId();
}
function mapVideo(v){
  const title=makeTitle(v.url);
  if(title.length>255)return null;
  let file_url="";
  if(Array.isArray(v.video_files)&&v.video_files.length){
    const sorted=v.video_files.sort((a,b)=>b.width-a.width);
    file_url=sorted[0].link;
  }
  if(!file_url)return null;
  return{
    
    id:"pexels.videos."+makeId(title),
    title:title,
    file_url:file_url,
    file_type:"video",
    uploader:"Pexels",
    album_id:ALBUM_ID
  };
}
async function fetchVideos(key,q){
  const base=q?"https://api.pexels.com/videos/search":"https://api.pexels.com/videos/popular";
  const url=base+"?page="+page+"&per_page=10"+(q?"&query="+encodeURIComponent(q):"");
  const r=await fetch(url,{headers:{Authorization:key}});
  if(!r.ok)throw new Error("Pexels API "+r.status);
  const j=await r.json();return j.videos||[];
}
async function upload(rows){
  if(!rows.length)return;
  const {error}=await supabaseClient.from(TABLE_NAME).upsert(rows,{onConflict:["file_url"]});
  if(error)log("⚠ "+error.message); else log("✅ Uploaded "+rows.length+" videos");
}
async function loop(){
  while(running){
    try{
      const key=document.getElementById("pexelsKey").value.trim();
      const q=document.getElementById("query").value.trim();
      const vids=await fetchVideos(key,q);
      if(!vids.length){log("No more results → restart page 1");page=1;continue;}
      const rows=[];
      for(const v of vids){
        if(seenIds.has(v.id))continue; seenIds.add(v.id);
        const row=mapVideo(v); if(!row)continue;
        if(seenUrls.has(row.file_url))continue; seenUrls.add(row.file_url);
        rows.push(row);
      }
      await upload(rows);
      page++;
      await new Promise(r=>setTimeout(r,5000)); // 5 s delay
    }catch(e){log("Error: "+e.message);await new Promise(r=>setTimeout(r,10000));}
  }
}
document.getElementById("startBtn").onclick=()=>{
  const key=document.getElementById("pexelsKey").value.trim();
  if(!key){alert("Enter Pexels API key first.");return;}
  if(!supabaseClient)supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  running=true;page=1;log("▶ Auto-sync started…");
  document.getElementById("startBtn").disabled=true;
  document.getElementById("stopBtn").disabled=false;
  loop();
};
document.getElementById("stopBtn").onclick=()=>{
  running=false;
  document.getElementById("startBtn").disabled=false;
  document.getElementById("stopBtn").disabled=true;
  log("⏹ Stopped.");
};
</script>
</body>
</html>
