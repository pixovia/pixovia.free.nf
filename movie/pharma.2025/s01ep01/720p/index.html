<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <title>Pharma 2025 | Pixovia Movie Player</title>
  <meta name="description" content="Pixovia Movie Player - Multi-language support and mobile optimization.">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 100%);
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
    }
    
    .header {
      padding: 1rem 2rem;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(45deg, #00f5ff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .back-btn {
      background: linear-gradient(45deg, #00f5ff, #ff00ff);
      border: none;
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,245,255,0.4);
    }

    /* Language Selection Overlay */
    #langSelector {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .lang-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      width: 100%;
      max-width: 600px;
      margin-top: 30px;
    }

    .lang-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .lang-card:hover {
      background: rgba(0,245,255,0.1);
      border-color: #00f5ff;
      transform: scale(1.05);
    }

    .yt-video-container {
      max-width: 1280px;
      margin: 20px auto;
      padding: 20px;
      position: relative;
    }
    
    .yt-video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }
    
    .yt-video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }
    
    .yt-video::-webkit-media-controls { display: none !important; }
    
    .yt-video::cue {
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 18px;
    }

    .custom-controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 20px 16px 16px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 20;
    }
    
    .custom-controls.show, .yt-video-wrapper:hover .custom-controls {
      opacity: 1;
      pointer-events: auto;
    }
    
    .progress-container { margin-bottom: 12px; }
    
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      cursor: pointer;
    }
    
    .progress-fill {
      height: 100%;
      background: #00f5ff;
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s;
    }
    
    .control-buttons { display: flex; align-items: center; gap: 12px; }
    
    .control-btn {
      background: none; border: none; color: white;
      font-size: 18px; cursor: pointer; padding: 8px; border-radius: 4px;
    }
    
    .control-btn:hover { background: rgba(255,255,255,0.1); }
    
    .volume-container { display: flex; align-items: center; gap: 8px; }
    .volume-slider { width: 60px; height: 4px; }
    
    .center-play-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7); border: none; color: white;
      width: 80px; height: 80px; border-radius: 50%; font-size: 32px;
      cursor: pointer; z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }
    
    .yt-info { padding: 16px 0; }
    .yt-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .yt-meta { color: #aaa; font-size: 14px; }

    #loadingOverlay {
        position: absolute; inset: 0; background: rgba(0,0,0,0.5);
        display: none; align-items: center; justify-content: center; z-index: 30;
    }

    @media screen and (max-width: 768px) {
      .yt-video-container { padding: 10px; }
      .custom-controls { padding: 15px 12px 12px; opacity: 1 !important; pointer-events: auto !important; }
      .volume-container { display: none; }
      .lang-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- Language Selection Overlay -->
  <div id="langSelector">
    <h2 style="font-size: 2rem; margin-bottom: 10px;">Select Language</h2>
    <p style="color: #aaa;">Choose your preferred audio track to start</p>
    <div class="lang-grid">
      <div class="lang-card" onclick="selectLanguage('mal')">Malayalam</div>
      <div class="lang-card" onclick="selectLanguage('hin')">Hindi</div>
      <div class="lang-card" onclick="selectLanguage('tam')">Tamil</div>
      <div class="lang-card" onclick="selectLanguage('tel')">Telugu</div>
      <div class="lang-card" onclick="selectLanguage('kan')">Kannada</div>
      <div class="lang-card" onclick="selectLanguage('ben')">Bengali</div>
      <div class="lang-card" onclick="selectLanguage('mar')">Marathi</div>
    </div>
  </div>

  <div class="header">
    <div class="logo">Pixovia Movie Player</div>
    <button class="back-btn" onclick="goBack()">← Back to Home</button>
  </div>

  <div class="yt-video-container" id="videoContainer" style="display: none;">
    <div class="yt-video-wrapper">
      <video id="ytVideo" class="yt-video" playsinline disablePictureInPicture></video>
      <div id="loadingOverlay"><span>Loading...</span></div>
      <button id="centerPlayBtn" class="center-play-btn" onclick="togglePlayPause()">▶</button>
      
      <div class="custom-controls" id="customControls">
        <div class="progress-container">
          <div class="progress-bar" id="progressBar" onclick="seekVideo(event)">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
        <div class="control-buttons">
          <button class="control-btn" id="playPauseBtn" onclick="togglePlayPause()">▶</button>
          <div class="volume-container">
            <button class="control-btn" id="volumeBtn" onclick="toggleMute()">🔊</button>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" oninput="setVolume(this.value)">
          </div>
          <span id="timeDisplay" style="font-size:14px;color:#ccc;">0:00 / 0:00</span>
          <div style="flex:1;"></div>
          
          <!-- Language Switcher Button -->
          <button class="control-btn" onclick="showLangSelector()" title="Switch Language" style="font-size:14px; border:1px solid #444; padding:4px 8px;">🌐 Language</button>
          
          <button class="control-btn" id="ccBtn" onclick="toggleSubtitles()" title="Toggle Subtitles">CC</button>
          <button class="control-btn" id="fsBtn" onclick="toggleFullscreen()">⛶</button>
        </div>
      </div>
    </div>
    <div class="yt-info">
      <h1 class="yt-title" id="ytTitle">Pharma - Season 01 Episode 01</h1>
      <div class="yt-meta" id="ytMeta">Pixovia Premium Stream • 720p • <span id="activeLangText">Malayalam</span></div>
    </div>
  </div>

  <script>
    const videos = {
      mal: "https://github.com/movihosteei/web-series-files-1/releases/download/v1.mal.720p.0.1/Pharma.S01E01.Malayalam.mp4",
      hin: "https://github.com/movihosteei/web-series-files-1/releases/download/v1.hin.720p.0.1/Pharma.S01E01.Hindi.mp4",
      tam: "https://github.com/movihosteei/web-series-files-1/releases/download/v1.tam.720p.0.1/Pharma.S01E01.Tamil.mp4",
      tel: "https://github.com/movihosteei/web-series-files-1/releases/download/v1.tel.720p.0.1/Pharma.S01E01.Telugu.mp4",
      kan: "https://github.com/movihosteei/web-series-files-1/releases/download/v1.kan.720p.0.1/Pharma.S01E01.Kannada.mp4",
      ben: "https://github.com/movihosteei/web-series-files-1/releases/download/v1.ben.720p.0.1/Pharma.S01E01.Bengali.mp4",
      mar: "https://github.com/movihosteei/web-series-files-1/releases/download/v1.mar.720p.0.1/Pharma.S01E01.Marathi.mp4"
    };

    const subtitleUrl = "https://movihosteei.github.io/web-series-files-1/subs/Pharma.S01E01.English.srt";

    const video = document.getElementById('ytVideo');
    const langOverlay = document.getElementById('langSelector');
    const videoContainer = document.getElementById('videoContainer');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const progressFill = document.getElementById('progressFill');
    const timeDisplay = document.getElementById('timeDisplay');
    const activeLangText = document.getElementById('activeLangText');
    const ccBtn = document.getElementById('ccBtn');
    const centerPlayBtn = document.getElementById('centerPlayBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');

    let currentLang = '';
    let subtitlesVisible = true;

    function goBack() { window.location.href = '../'; }

    // Convert SRT to VTT
    async function srtToVtt(url) {
      try {
        const response = await fetch(url);
        const text = await response.text();
        let vtt = "WEBVTT\n\n" + text.replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2');
        return URL.createObjectURL(new Blob([vtt], { type: 'text/vtt' }));
      } catch (err) { return null; }
    }

    async function selectLanguage(langCode) {
        currentLang = langCode;
        langOverlay.style.display = 'none';
        videoContainer.style.display = 'block';
        
        const langNames = { mal: 'Malayalam', hin: 'Hindi', tam: 'Tamil', tel: 'Telugu', kan: 'Kannada', ben: 'Bengali', mar: 'Marathi' };
        activeLangText.textContent = langNames[langCode];

        await loadVideo(videos[langCode]);
    }

    function showLangSelector() {
        video.pause();
        langOverlay.style.display = 'flex';
    }

    async function loadVideo(url) {
        loadingOverlay.style.display = 'flex';
        centerPlayBtn.style.display = 'none'; // Hide play btn while loading
        const currentTime = video.currentTime;
        
        const vttUrl = await srtToVtt(subtitleUrl);
        const tracks = video.querySelectorAll('track');
        tracks.forEach(t => t.remove());
        
        if (vttUrl) {
          const track = document.createElement('track');
          track.kind = 'subtitles'; track.label = 'English'; track.srclang = 'en';
          track.src = vttUrl; track.default = true;
          video.appendChild(track);
        }

        video.src = url;
        video.load();
        video.currentTime = currentTime;
        
        video.onloadedmetadata = () => {
          loadingOverlay.style.display = 'none';
          if (currentTime > 0) {
              video.play();
          } else {
              centerPlayBtn.style.display = 'flex';
          }
        };
    }

    function togglePlayPause() { video.paused ? video.play() : video.pause(); }

    function seekVideo(event) {
        const rect = document.getElementById('progressBar').getBoundingClientRect();
        const pos = (event.clientX - rect.left) / rect.width;
        video.currentTime = pos * video.duration;
    }

    video.addEventListener('timeupdate', () => {
        const progress = (video.currentTime / video.duration) * 100;
        progressFill.style.width = progress + '%';
        timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
    });

    video.addEventListener('play', () => {
        playPauseBtn.textContent = '⏸';
        centerPlayBtn.style.display = 'none';
    });

    video.addEventListener('pause', () => {
        playPauseBtn.textContent = '▶';
        // Only show center button if not loading
        if (loadingOverlay.style.display !== 'flex') {
            centerPlayBtn.style.display = 'flex';
        }
    });

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function toggleSubtitles() {
      subtitlesVisible = !subtitlesVisible;
      if (video.textTracks[0]) video.textTracks[0].mode = subtitlesVisible ? 'showing' : 'hidden';
      ccBtn.style.color = subtitlesVisible ? '#00f5ff' : '#666';
    }

    function setVolume(val) { video.volume = val / 100; updateVol(); }
    function toggleMute() { video.muted = !video.muted; updateVol(); }
    function updateVol() {
        const b = document.getElementById('volumeBtn');
        b.textContent = (video.muted || video.volume === 0) ? '🔇' : (video.volume < 0.5 ? '🔉' : '🔊');
    }

    async function toggleFullscreen() {
        const container = document.querySelector('.yt-video-wrapper');
        if (!document.fullscreenElement) {
            if (container.requestFullscreen) await container.requestFullscreen();
            if (screen.orientation?.lock) await screen.orientation.lock('landscape').catch(() => {});
        } else {
            document.exitFullscreen();
        }
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang');
        if (lang && videos[lang]) {
            selectLanguage(lang);
        }
    };
  </script>
</body>
</html>
