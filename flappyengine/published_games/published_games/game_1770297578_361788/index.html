        const imgs = {
            bird: new Image(), bg: new Image(), pipe: new Image(), 
            win: new Image(), die: new Image()
        };
        imgs.bird.src = assets.bird; imgs.bg.src = assets.bg; 
        imgs.pipe.src = assets.pipe; imgs.win.src = assets.winImg; 
        imgs.die.src = assets.dieImg;

        const snds = {
            jump: new Audio(assets.jumpSnd), 
            lose: new Audio(assets.loseSnd), 
            win: new Audio(assets.winSnd)
        };

        let state = 'START'; let score = 0; let frames = 0;
        let bird = { x: 50, y: 0, w: 40, h: 30, v: 0 };
        let pipes = [];

        function resize() {
            canvas.height = window.innerHeight;
            canvas.width = Math.min(window.innerWidth, canvas.height * 0.7);
        }
        window.onresize = resize; resize();

        function startGame() {
            state = 'PLAY';
            document.getElementById('msg-box').style.display = 'none';
            bird.y = canvas.height/2;
        }

        function jump() {
            if(state === 'PLAY') {
                bird.v = -canvas.height * 0.012;
                snds.jump.currentTime = 0; snds.jump.play().catch(()=>{});
            }
        }

        window.onclick = jump;
        window.onkeydown = e => e.code === 'Space' && jump();

        function loop() {
            ctx.drawImage(imgs.bg, 0, 0, canvas.width, canvas.height);
            if(state === 'PLAY') {
                bird.v += canvas.height * 0.0006; bird.y += bird.v;
                if(frames % 100 === 0) {
                    const g = 200; const t = Math.random() * (canvas.height - g - 100) + 50;
                    pipes.push({ x: canvas.width, t, g });
                }
                pipes.forEach(p => {
                    p.x -= 3;
                    ctx.drawImage(imgs.pipe, p.x, p.t + p.g, 52, canvas.height);
                    ctx.save(); ctx.translate(p.x + 26, p.t); ctx.rotate(Math.PI);
                    ctx.drawImage(imgs.pipe, -26, 0, 52, canvas.height); ctx.restore();
                    
                    if(bird.x+bird.w > p.x && bird.x < p.x+52 && (bird.y < p.t || bird.y+bird.h > p.t+p.g)) die();
                    if(!p.s && p.x < bird.x) { p.s = true; score++; snds.win.play().catch(()=>{}); }
                });
                if(bird.y + bird.h > canvas.height || bird.y < 0) die();
                frames++;
            }
            ctx.drawImage(imgs.bird, bird.x, bird.y, bird.w, bird.h);
            document.getElementById('score').innerText = score;
            requestAnimationFrame(loop);
        }

        function die() {
            state = 'END';
            snds.lose.play().catch(()=>{});
            document.getElementById('die-img').src = assets.dieImg;
            document.getElementById('die-box').style.display = 'block';
        }
        loop();
