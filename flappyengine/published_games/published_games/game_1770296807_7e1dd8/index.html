        const birdImg = new Image(); birdImg.src = assets.bird;
        const bgImg = new Image(); bgImg.src = assets.bg;
        const pipeImg = new Image(); pipeImg.src = assets.pipe;
        const jumpSnd = new Audio(assets.jumpSound);
        const loseSnd = new Audio(assets.loseSound);
        const winSnd = new Audio(assets.winSound);

        let gameState = 'START';
        let score = 0;
        let bird = { x: 50, y: 200, w: 34, h: 24, v: 0 };
        let pipes = [];
        let frames = 0;

        function resize() {
            canvas.height = window.innerHeight;
            canvas.width = Math.min(window.innerWidth, canvas.height * 0.66);
        }
        window.onresize = resize; resize();

        function jump() { 
            if(gameState==='PLAYING'){ 
                bird.v = -canvas.height*0.013; 
                jumpSnd.currentTime=0; jumpSnd.play().catch(()=>{}); 
            } 
        }
        window.onkeydown=e=>e.code==='Space'&&jump();
        canvas.ontouchstart=e=>{e.preventDefault(); jump();};
        canvas.onmousedown=e=>{e.preventDefault(); jump();};
        
        document.getElementById('start-btn').onclick=()=>{
            gameState='PLAYING'; 
            document.getElementById('msg-box').style.display='none';
            bird.y=canvas.height/2; bird.v=0; pipes=[]; score=0;
        };

        function loop() {
            ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            if(gameState==='PLAYING') {
                bird.v += canvas.height*0.00065; bird.y += bird.v;
                if(frames%100===0){
                    const g = canvas.height*0.28;
                    const t = Math.random()*(canvas.height-g-100)+50;
                    pipes.push({x:canvas.width, t, g});
                }
                pipes.forEach((p,i)=>{
                    p.x-=3;
                    ctx.drawImage(pipeImg, p.x, p.t+p.g, 50, canvas.height);
                    ctx.save(); ctx.translate(p.x+25, p.t); ctx.rotate(Math.PI);
                    ctx.drawImage(pipeImg, -25, 0, 50, canvas.height); ctx.restore();
                    if(bird.x+bird.w > p.x && bird.x < p.x+50 && (bird.y < p.t || bird.y+bird.h > p.t+p.g)) die();
                    if(!p.s && p.x+25 < bird.x){ p.s=true; score++; document.getElementById('score').innerText=score; winSnd.play().catch(()=>{}); }
                });
                if(bird.y+bird.h > canvas.height || bird.y < 0) die();
                frames++;
            }
            ctx.drawImage(birdImg, bird.x, bird.y, bird.w, bird.h);
            requestAnimationFrame(loop);
        }
        function die(){ gameState='GAMEOVER'; loseSnd.play().catch(()=>{}); location.reload(); }
        loop();
