<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fake Update Generator | Pixovia LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top left, #1e293b, #0f172a);
      min-height: 100vh;
      color: #f8fafc;
    }

    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    input, select {
      background: rgba(15, 23, 42, 0.6) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: white !important;
    }

    input:focus, select:focus {
      border-color: #3b82f6 !important;
      outline: none;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div class="w-full max-w-lg glass p-8 rounded-2xl shadow-2xl">
    <header class="text-center mb-10">
      <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400">
        Fake Update Generator
      </h1>
      <p class="text-slate-400 text-sm mt-2 font-medium tracking-wide">Professional Prank Suite by Pixovia LLC</p>
    </header>

    <form id="fakeUpdateForm" class="space-y-6">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Hours</label>
          <input type="number" name="hours" min="0" max="24" value="0" required
            class="w-full px-4 py-3 rounded-xl transition-all">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Minutes</label>
          <input type="number" name="minutes" min="0" max="59" value="15" required
            class="w-full px-4 py-3 rounded-xl transition-all">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">OS Style</label>
          <select name="os" class="w-full px-4 py-3 rounded-xl transition-all appearance-none">
            <option value="win11">Windows 11</option>
            <option value="win10">Windows 10</option>
            <option value="win7">Windows 7</option>
            <option value="mac">macOS</option>
            <option value="linux">Linux</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Theme</label>
          <select name="theme" class="w-full px-4 py-3 rounded-xl transition-all appearance-none">
            <option value="dark" selected>Dark Mode</option>
            <option value="light">Light Mode</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Simulation Message</label>
        <input type="text" name="message" value="Installing critical security updates. Please wait..."
          class="w-full px-4 py-3 rounded-xl transition-all">
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Click Redirect URL</label>
        <input type="url" name="click_redirect" placeholder="https://example.com"
          class="w-full px-4 py-3 rounded-xl transition-all">
      </div>

      <div class="pt-4">
        <button type="submit" 
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98]">
          Start Simulation
        </button>
        <p class="text-center text-[11px] text-slate-500 mt-6 italic">
          Tip: Once the simulation starts, click anywhere to trigger your redirect URL.
        </p>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('fakeUpdateForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = new FormData(e.target);
      const params = new URLSearchParams();
      
      for (const [key, value] of data.entries()) {
        if (value) params.append(key, value);
      }
      
      // Redirects to the simulation page
      window.location.href = 'update.html?' + params.toString();
    });
  </script>
</body>
</html>
