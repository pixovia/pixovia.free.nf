<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Signal Lost - Pixovia</title>
    
    <!-- Robots Protection: Ensure error pages are not crawled or indexed -->
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000 100%);
            z-index: -1;
        }

        .orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.02) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .error-code {
            font-size: 20vw;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.08em;
            color: rgba(255, 255, 255, 0.02);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            user-select: none;
            text-transform: uppercase;
            font-style: italic;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 80px 40px;
            position: relative;
            z-index: 10;
            max-width: 700px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        .status-badge {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: #ffffff;
            color: #000000;
            padding: 4px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 32px;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            padding: 20px 40px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.1);
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="animated-bg">
        <div class="orb"></div>
    </div>
    <div class="grid-lines"></div>
    <div class="error-code">Lost</div>

    <div class="glass-card">
        <div class="status-badge">404: Disconnected</div>

        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter uppercase leading-none mb-8">
            Node <span class="text-gray-600 italic">Redacted.</span>
        </h1>

        <p class="text-gray-400 text-lg font-light leading-relaxed mb-12 max-w-md mx-auto">
            The requested sequence does not exist within the <span class="text-white font-semibold">pixovia.free.nf</span> mesh. It may have been relocated to the secure archive.
        </p>

        <div class="flex flex-col items-center gap-6">
            <a href="https://pixovia.pages.dev/" class="btn-primary">Return to Hub</a>
            <div class="flex gap-10">
                <a href="https://pixovia.pages.dev/contributors" class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em] hover:text-white transition">Network Portal</a>
                <a href="https://pixovia.pages.dev/contact" class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em] hover:text-white transition">Support</a>
            </div>
        </div>

        <div class="mt-16 pt-8 border-t border-white/5">
            <p class="mono text-[9px] text-gray-800 uppercase tracking-[0.5em] font-bold">
                Pixovia LLC • Digital Liberation Front • 2026
            </p>
        </div>
    </div>

</body>
</html>
