<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 | Unauthorized - Pixovia</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030303;
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Floating Security Rings */
        .security-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
            pointer-events: none;
        }

        .ring {
            position: absolute;
            border: 1px solid rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            animation: pulse-ring 8s infinite ease-in-out;
        }

        .ring-1 { width: 300px; height: 300px; animation-delay: 0s; }
        .ring-2 { width: 500px; height: 500px; animation-delay: 1s; }
        .ring-3 { width: 700px; height: 700px; animation-delay: 2s; }

        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }

        .glass-card {
            background: rgba(15, 15, 20, 0.6);
            border: 1px solid rgba(139, 92, 246, 0.2);
            backdrop-filter: blur(40px);
            border-radius: 48px;
            padding: 70px 50px;
            position: relative;
            z-index: 10;
            max-width: 540px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .lock-icon {
            font-size: 40px;
            margin-bottom: 30px;
            display: inline-block;
            color: #a78bfa;
            filter: drop-shadow(0 0 15px rgba(167, 139, 250, 0.4));
        }

        .error-tag {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #a78bfa;
            margin-bottom: 20px;
            display: block;
        }

        .btn-auth {
            background: #ffffff;
            color: #000000;
            padding: 18px 40px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: inline-block;
            border: 1px solid transparent;
        }

        .btn-auth:hover {
            background: transparent;
            color: #ffffff;
            border-color: #ffffff;
            transform: translateY(-2px);
        }

        .secondary-link {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
            transition: color 0.3s;
        }

        .secondary-link:hover {
            color: #a78bfa;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    
    <div class="security-bg">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
    </div>

    <div class="glass-card">
        <div class="lock-icon">
            <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
        </div>

        <span class="error-tag">Status 401 // Unauthorized</span>

        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter uppercase mb-6 leading-tight">
            Identity <br><span class="text-white/30 italic font-light">Unverified.</span>
        </h1>

        <p class="text-gray-400 text-sm font-medium leading-relaxed mb-10 max-w-xs mx-auto opacity-80">
            Authentication credentials are missing or invalid for the requested Pixovia node.
        </p>

        <div class="flex flex-col gap-6 items-center">
            <a href="https://pixovia.pages.dev/" class="btn-auth">Verify Credentials</a>
            <a href="https://pixovia.pages.dev/" class="secondary-link">Return to Hub</a>
        </div>

        <div class="mt-16 pt-8 border-t border-white/5">
            <p class="mono text-[9px] text-gray-600 uppercase tracking-widest">
                Security Protocol: PX-GATEKEEPER-V2
            </p>
        </div>
    </div>

</body>
</html>
