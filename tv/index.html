<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixovia TV - Global IPTV Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #e50914;
            --bg-dark: #0f0f0f;
            --surface: #1e1e1e;
        }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .channel-card:hover {
            transform: scale(1.05);
            background-color: #2a2a2a;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        .active-category {
            background-color: var(--primary) !important;
            color: white !important;
        }
        #video-container {
            aspect-ratio: 16 / 9;
            background: black;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid var(--primary);
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="bg-black border-b border-gray-800 p-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-red-600 p-1.5 rounded text-white font-bold tracking-tighter text-xl">Pixovia TV</div>
        </div>
        
        <div class="flex-1 max-w-xl px-4">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                <input type="text" id="search-input" placeholder="Search channels..." 
                       class="w-full bg-neutral-900 border border-gray-700 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:border-red-600">
            </div>
        </div>

        <div class="flex items-center gap-4">
            <span id="channel-count" class="text-xs text-gray-500 hidden md:block">Loading...</span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 bg-black border-r border-gray-800 overflow-y-auto hidden md:block custom-scrollbar">
            <div class="p-4">
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4">Categories</h3>
                <nav id="category-list" class="space-y-1"></nav>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <section id="player-section" class="bg-black p-0 md:p-6 hidden border-b border-gray-800">
                <div class="max-w-5xl mx-auto w-full">
                    <div id="video-container" class="relative group rounded-xl overflow-hidden shadow-2xl">
                        <video id="video" class="w-full h-full" controls autoplay></video>
                        <div id="error-overlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center hidden p-6 text-center">
                            <i class="fas fa-exclamation-triangle text-4xl text-yellow-500 mb-4"></i>
                            <h3 class="text-lg font-bold">Playback Error</h3>
                            <p id="error-message" class="text-gray-400 text-sm mt-2 max-w-xs"></p>
                            <button onclick="retryCurrent()" class="mt-4 bg-white text-black px-6 py-2 rounded-full font-bold text-sm">Retry Connection</button>
                        </div>
                    </div>
                    <div class="mt-4 flex justify-between items-center px-2 pb-4">
                        <div>
                            <h2 id="current-title" class="text-2xl font-bold">Channel</h2>
                            <p id="current-group" class="text-gray-400 text-sm">Category</p>
                        </div>
                        <button onclick="closePlayer()" class="bg-neutral-800 hover:bg-neutral-700 px-4 py-2 rounded-lg text-sm">Close</button>
                    </div>
                </div>
            </section>

            <div id="grid-container" class="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar">
                <div id="loading-state" class="flex flex-col items-center justify-center h-full space-y-4">
                    <div class="loader"></div>
                    <p class="text-gray-400 text-sm">Initializing Pixovia Engine...</p>
                </div>
                <div id="channel-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4"></div>
            </div>
        </main>
    </div>

    <script>
        const M3U_URL = 'https://iptv-org.github.io/iptv/index.m3u';
        let allChannels = [];
        let filteredChannels = [];
        let hls = null;
        let lastChannel = null;

        const video = document.getElementById('video');
        const grid = document.getElementById('channel-grid');
        const loader = document.getElementById('loading-state');
        const searchInput = document.getElementById('search-input');
        const errorOverlay = document.getElementById('error-overlay');
        const errorMessage = document.getElementById('error-message');

        async function fetchChannels() {
            try {
                const response = await fetch(M3U_URL);
                const data = await response.text();
                allChannels = parseM3U(data);
                filteredChannels = allChannels;
                document.getElementById('channel-count').innerText = `${allChannels.length.toLocaleString()} Channels`;
                renderCategories();
                renderGrid(allChannels);
                loader.classList.add('hidden');
            } catch (error) {
                loader.innerHTML = `<p class="text-red-500">Network Error: Unable to fetch M3U list.</p>`;
            }
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            const channels = [];
            let currentChannel = {};
            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.*)$/);
                    const logoMatch = line.match(/tvg-logo="(.*?)"/);
                    const groupMatch = line.match(/group-title="(.*?)"/);
                    currentChannel = {
                        name: nameMatch ? nameMatch[1] : 'Unknown',
                        logo: logoMatch ? logoMatch[1] : '2020s/default.jpg',
                        group: groupMatch ? groupMatch[1] : 'General'
                    };
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = {};
                }
            }
            return channels;
        }

        function renderGrid(channels) {
            grid.innerHTML = '';
            channels.slice(0, 100).forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card bg-neutral-900 rounded-lg p-3 cursor-pointer ring-1 ring-gray-800 flex flex-col items-center';
                card.onclick = () => playChannel(channel);
                card.innerHTML = `
                    <div class="w-full aspect-video mb-2 rounded bg-black flex items-center justify-center overflow-hidden">
                        <img src="${channel.logo}" class="max-h-full" onerror="this.src='2020s/default.jpg'">
                    </div>
                    <span class="text-xs font-medium line-clamp-1">${channel.name}</span>
                `;
                grid.appendChild(card);
            });
        }

        function renderCategories() {
            const categories = ['All', ...new Set(allChannels.map(c => c.group))].sort();
            const nav = document.getElementById('category-list');
            categories.slice(0, 20).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-btn w-full text-left px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-neutral-800';
                btn.innerText = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active-category'));
                    btn.classList.add('active-category');
                    filteredChannels = cat === 'All' ? allChannels : allChannels.filter(c => c.group === cat);
                    renderGrid(filteredChannels);
                };
                nav.appendChild(btn);
            });
        }

        function playChannel(channel) {
            lastChannel = channel;
            errorOverlay.classList.add('hidden');
            document.getElementById('player-section').classList.remove('hidden');
            document.getElementById('current-title').innerText = channel.name;
            document.getElementById('current-group').innerText = channel.group;

            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                // ADDED: Configuration for better error handling
                hls = new Hls({
                    enableWorker: true,
                    manifestLoadingMaxRetry: 2,
                    levelLoadingMaxRetry: 2
                });
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.error("Fatal network error, trying to recover...");
                                hls.startLoad();
                                showPlayerError("Stream connection lost. This link might be blocked by CORS or the server is down.");
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.error("Fatal media error, trying to recover...");
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                showPlayerError("Unrecoverable error occurred.");
                                break;
                        }
                    }
                });
            }
            document.getElementById('player-section').scrollIntoView({ behavior: 'smooth' });
        }

        function showPlayerError(msg) {
            errorMessage.innerText = msg;
            errorOverlay.classList.remove('hidden');
        }

        function retryCurrent() {
            if (lastChannel) playChannel(lastChannel);
        }

        function closePlayer() {
            if (hls) hls.destroy();
            video.pause();
            document.getElementById('player-section').classList.add('hidden');
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const results = filteredChannels.filter(c => c.name.toLowerCase().includes(term));
            renderGrid(results);
        });

        window.onload = fetchChannels;
    </script>
</body>
</html>
