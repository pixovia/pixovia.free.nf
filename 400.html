<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 | Bad Request - Pixovia</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Fractured Digit Design */
        .digit-wrap {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.07;
            pointer-events: none;
        }

        .shatter {
            font-size: 35vw;
            font-weight: 900;
            letter-spacing: -0.05em;
            display: flex;
        }

        .char-4 { transform: rotate(-10deg) translateX(20px); }
        .char-0-1 { transform: rotate(5deg) translateY(-30px); }
        .char-0-2 { transform: rotate(15deg) translateX(-20px) translateY(20px); }

        .glass-card {
            background: rgba(10, 10, 10, 0.4);
            border: 1px solid rgba(255, 191, 0, 0.1);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            padding: 60px;
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .error-code {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffbf00;
            border: 1px solid #ffbf00;
            padding: 5px 15px;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 25px;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            padding: 18px 36px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            background: #ffbf00;
        }

        /* Glitch Scanline Effect */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 191, 0, 0.1);
            position: absolute;
            z-index: 20;
            top: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="scanline"></div>
    
    <!-- Fractured 400 Design -->
    <div class="digit-wrap">
        <div class="shatter mono">
            <span class="char-4">4</span>
            <span class="char-0-1">0</span>
            <span class="char-0-2">0</span>
        </div>
    </div>

    <div class="glass-card">
        <div class="error-code">Error 400 // Malformed</div>

        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter uppercase mb-6 leading-tight">
            Syntax <br><span class="text-white/40 italic font-light">Corrupted.</span>
        </h1>

        <p class="text-gray-400 text-base font-light leading-relaxed mb-10 max-w-xs mx-auto">
            The request string sent to <span class="text-white">pixovia.free.nf</span> contains illegal characters or invalid data structures.
        </p>

        <div class="space-y-6">
            <a href="https://pixovia.pages.dev" class="btn-primary">Re-initialize Session</a>
            <div class="pt-4">
                <p class="mono text-[10px] text-gray-600 uppercase tracking-widest">
                    Transmission ID: PX-400-ERR-ALPHA
                </p>
            </div>
        </div>
    </div>

</body>
</html>
