<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>503 | Under Maintenance - Pixovia</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #080705;
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Amber Pulsing Aura */
        .maintenance-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 1;
            animation: pulse-slow 6s infinite alternate ease-in-out;
        }

        @keyframes pulse-slow {
            0% { transform: scale(0.8); opacity: 0.3; }
            100% { transform: scale(1.2); opacity: 0.6; }
        }

        /* Moving Beam Effect */
        .beam {
            position: absolute;
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(245, 158, 11, 0.3), transparent);
            left: 50%;
            top: 0;
            animation: scan 4s infinite linear;
            z-index: 2;
        }

        @keyframes scan {
            0% { left: 30%; opacity: 0; }
            50% { opacity: 1; }
            100% { left: 70%; opacity: 0; }
        }

        .glass-card {
            background: rgba(15, 12, 8, 0.6);
            border: 1px solid rgba(245, 158, 11, 0.15);
            backdrop-filter: blur(40px);
            border-radius: 48px;
            padding: 72px 48px;
            position: relative;
            z-index: 10;
            max-width: 540px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 120px rgba(0,0,0,0.8);
        }

        .status-tag {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
            padding: 8px 16px;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 32px;
        }

        .progress-container {
            width: 100%;
            height: 2px;
            background: rgba(245, 158, 11, 0.1);
            margin: 40px 0;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            height: 100%;
            width: 30%;
            background: #f59e0b;
            box-shadow: 0 0 15px #f59e0b;
            animation: move-progress 2s infinite ease-in-out;
        }

        @keyframes move-progress {
            0% { left: -30%; }
            100% { left: 100%; }
        }

        .btn-check {
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 18px 40px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            background: rgba(255, 255, 255, 0.03);
        }

        .btn-check:hover {
            background: #ffffff;
            color: #000000;
            transform: scale(1.02);
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="maintenance-glow"></div>
    <div class="beam"></div>

    <div class="glass-card">
        <span class="status-tag">System Stasis</span>

        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-6 leading-tight">
            Polishing the <br><span class="text-amber-500 italic">Pixels.</span>
        </h1>

        <p class="text-gray-400 text-sm font-medium leading-relaxed mb-8 max-w-xs mx-auto">
            Pixovia is currently undergoing scheduled refinement. We’ll be back online momentarily.
        </p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="flex flex-col gap-6 items-center">
            <button onclick="window.location.reload()" class="btn-check">
                Check Status
            </button>
            
            <div class="flex items-center gap-3 opacity-40">
                <span class="w-2 h-2 bg-amber-500 rounded-full animate-ping"></span>
                <span class="mono text-[10px] uppercase tracking-widest">Optimizing Node_04</span>
            </div>
        </div>

        <div class="mt-12 pt-8 border-t border-white/5">
            <p class="mono text-[9px] text-gray-600 uppercase tracking-[4px]">
                Error Code: 503_SERVICE_OVERLOAD
            </p>
        </div>
    </div>

</body>
</html>
