<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 | Access Denied - Pixovia</title>
    
    <!-- Robots Protection -->
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a0000 0%, #000 100%);
            z-index: -1;
        }

        .orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-red 4s infinite alternate;
        }

        @keyframes pulse-red {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Specialized Digit Arrangement */
        .digit-design {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            display: flex;
            gap: 2rem;
            opacity: 0.05;
            user-select: none;
        }

        .digit {
            font-size: 25vw;
            font-weight: 900;
            line-height: 1;
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(to bottom, #fff, transparent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(239, 68, 68, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 48px;
            padding: 80px 40px;
            position: relative;
            z-index: 10;
            max-width: 700px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .status-badge {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: #ef4444;
            color: #ffffff;
            padding: 4px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 32px;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            padding: 20px 40px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.1);
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(239, 68, 68, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
        }

        .warning-text {
            color: #ef4444;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="animated-bg">
        <div class="orb"></div>
    </div>
    <div class="grid-lines"></div>
    
    <!-- Special Digit Design -->
    <div class="digit-design">
        <div class="digit">4</div>
        <div class="digit" style="transform: translateY(20px);">0</div>
        <div class="digit">3</div>
    </div>

    <div class="glass-card">
        <div class="status-badge">403: Security Breach</div>

        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter uppercase leading-none mb-8">
            Access <span class="warning-text italic">Denied.</span>
        </h1>

        <p class="text-gray-400 text-lg font-light leading-relaxed mb-12 max-w-md mx-auto">
            Your current clearance level is insufficient to access this sector of the <span class="text-white font-semibold">pixovia.free.nf</span> network. Protocol 13 is in effect.
        </p>

        <div class="flex flex-col items-center gap-6">
            <a href="https://pixovia.pages.dev" class="btn-primary">Return to Hub</a>
            <div class="flex gap-10">
                <a href="pixovia_contributors.html" class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em] hover:text-white transition">Request Clearance</a>
                <a href="#" class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em] hover:text-white transition">Security Auth</a>
            </div>
        </div>

        <div class="mt-16 pt-8 border-t border-white/5">
            <p class="mono text-[9px] text-gray-800 uppercase tracking-[0.5em] font-bold">
                Pixovia LLC • Perimeter Security Division • 2026
            </p>
        </div>
    </div>

</body>
</html>
